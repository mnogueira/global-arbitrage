  ewz_bova:
    - id: ewz_bova11_bridge
      label: "EWZ bridge: EWZ -> BOVA11"
      local_symbol: BOVA11.SA
      external_symbol: EWZ
      external_market_symbol: EWZ
      lookback: 60
      open_threshold_bps: 70.0
      close_threshold_bps: 20.0
      max_holding_bars: 5
      costs:
        exchange_fee_bps: 6.0
        fx_bps: 8.0
        slippage_bps: 12.0
        tracking_bps: 15.0
      mt5_symbol: BOVA11
      proxy_symbol: WIN$N
      ib_symbol: EWZ

  cross_market:
    # Continuous futures below are safe default scanners.
    # If you want live IB execution on these strategies, replace the IB market symbol
    # with a concrete front-month contract alias and set ib_symbol explicitly.
    - id: oil_brent_wdo_bridge
      label: "Oil bridge: Brent -> WDO"
      local_symbol: WDO
      local_name: Mini USD futures
      external_symbol: BRENT_FRONT
      external_name: Brent crude front future
      external_market_symbol: BRENT_FRONT
      lookback: 40
      open_threshold_bps: 85.0
      close_threshold_bps: 25.0
      max_holding_bars: 4
      costs:
        exchange_fee_bps: 10.0
        fx_bps: 8.0
        slippage_bps: 18.0
        tracking_bps: 18.0
      mt5_symbol: WDO$N
      external_currency: USD
    - id: rates_us_treasury_di_bridge
      label: "Rates bridge: US Treasuries -> DI futures"
      local_symbol: DI1
      local_name: DI futures
      external_symbol: US10Y_FRONT
      external_name: US 10Y Treasury front future
      external_market_symbol: US10Y_FRONT
      lookback: 50
      open_threshold_bps: 90.0
      close_threshold_bps: 30.0
      max_holding_bars: 5
      costs:
        exchange_fee_bps: 10.0
        fx_bps: 8.0
        slippage_bps: 18.0
        tracking_bps: 20.0
      mt5_symbol: DI1$N
      external_currency: USD

  crypto_implied_fx:
