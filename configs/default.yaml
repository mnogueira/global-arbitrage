      adr_market_symbol: VALE
      local_name: Vale ON
      shares_per_adr: 1.0
      open_threshold_bps: 65.0
      close_threshold_bps: 15.0
      max_holding_bars: 10
      costs:
        exchange_fee_bps: 8.0
        fx_bps: 10.0
        slippage_bps: 7.0
        borrow_bps: 10.0
        settlement_bps: 10.0
      mt5_symbol: VALE3
