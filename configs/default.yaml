    - id: adr_itub4_itub
      local_symbol: ITUB4.SA
      adr_symbol: ITUB
      adr_market_symbol: ITUB
      local_name: Itau PN
      shares_per_adr: 1.0
      open_threshold_bps: 60.0
      close_threshold_bps: 15.0
      max_holding_bars: 10
