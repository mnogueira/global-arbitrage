store:
  path: storage/opportunities.duckdb
  alerts_root: storage/runtime

scanner:
  alert_threshold_bps: 35.0
  default_notional_brl: 100000.0

paper:
  initial_equity_brl: 250000.0
  risk_fraction: 0.20
  max_drawdown: 0.15
  stop_loss_bps: 250.0
  take_profit_bps: 300.0

brokers:
  ib:
    host: 127.0.0.1
    port: 4002
    client_id: 17
    market_data_type: 1
    base_currency: USD
    contracts:
      PBR:
        symbol: PBR
        sec_type: STK
        exchange: SMART
        currency: USD
      VALE:
        symbol: VALE
        sec_type: STK
        exchange: SMART
        currency: USD
      ITUB:
        symbol: ITUB
        sec_type: STK
        exchange: SMART
        currency: USD
      BBD:
        symbol: BBD
        sec_type: STK
        exchange: SMART
        currency: USD
      EWZ:
        symbol: EWZ
        sec_type: STK
        exchange: SMART
        currency: USD
      BRENT_FRONT:
        symbol: BRNT
        sec_type: CONTFUT
        exchange: ICEEU
        currency: USD
        what_to_show: TRADES
      US10Y_FRONT:
        symbol: ZN
        sec_type: CONTFUT
        exchange: CBOT
        currency: USD
        what_to_show: TRADES
  mt5:
    fx_proxy_symbol: WDO$N
    fx_proxy_scale: 1000.0
    prefer_fx_proxy: true

strategies:
  adr_parity:
