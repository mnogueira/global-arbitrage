      local_name: Petrobras PN
      shares_per_adr: 2.0
      open_threshold_bps: 80.0
      close_threshold_bps: 20.0
      max_holding_bars: 10
      costs:
        exchange_fee_bps: 8.0
        fx_bps: 10.0
        slippage_bps: 8.0
        borrow_bps: 12.0
        settlement_bps: 12.0
      mt5_symbol: PETR4
      ib_symbol: PBR
    - id: adr_vale3_vale
